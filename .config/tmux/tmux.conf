# Remove nvim color issue inside tmux
set -a terminal-overrides ',xterm-256color:RGB'

# Mouse support
set -g mouse on

# Status Bar
set -g status-style "fg=white,bg=black"
set -g status-left ""
set -g status-right "#S"

# Make sure it doesn't get truncated
set -g status-right-length 100   # or larger if you use very long names
set -g status-left-length 0      # no left content, no need for space there

# Start window numbering at 1
set -g base-index 1

# Start pane numbering at 1
setw -g pane-base-index 1

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'

# Unbind the default prefix
unbind C-b

# Set new prefix to Ctrl+a
set-option -g prefix C-a
bind-key C-a send-prefix

# Don't scroll to bottom after copying
set -g @yank_action "copy-pipe"


# Other examples:
# set -g @plugin 'github_username/plugin_name'
# set -g @plugin 'github_username/plugin_name#branch'
# set -g @plugin 'git@github.com:user/plugin'
# set -g @plugin 'git@bitbucket.com:user/plugin'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
